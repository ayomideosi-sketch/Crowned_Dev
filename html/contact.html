<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="shortcut icon" href="/Assets/logo.jpeg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body id="form">
    <!-- Background -->
        <div class="bg"></div>
        <div class="grid"></div>
<section class="contact-section" id="contact">
    <div class="contact-card">
        <div class="contact-glow"></div>
        <h2>Let's Work Together</h2>
        <p>Have an idea? Let's create something amazing.</p>
        <form id="contactForm">
            <div class="input-box">
                <input type="text" required>
                <label>Name</label>
            </div>
            <div class="input-box">
                <input type="email" required placeholder=" ">
                <label>Email</label>
            </div>
            <div class="input-box">
                <textarea required></textarea>
                <label class="msm">Message</label>
            </div>
            <button class="send-btn">
                <span>Send Message</span>
                <div class="btn-glow"></div>
            </button>
        </form>
    </div>
</section>
<div class="success-screen">
    <div class="ripple ripple1"></div>
    <div class="ripple ripple2"></div>
    <div class="ripple ripple3"></div>
    <div class="success-card">
        <div class="checkmark">✓</div>
        <h1>Message Sent Successfully</h1>
        <p>
            Thank you for reaching out.
            I'll get back to you soon.
        </p>
    </div>
</div>

    <script src="/js/main.js"></script>
     <script src="/js/custom-cursor.js"></script>
     <script src="/js/loader.js"></script>
     <script src="/js/mobile-nav.js"></script>
     <script src="/js/particles.js"></script>
     <script src="/js/scroll.js"></script>
     <script src="/js/three-cards.js"></script>
     <script src="/js/theme.js"></script>
</body>
</html>
